<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA fallback: redirect 404s back to index.html preserving the path.
    // It supports both root domains (/chat) and project pages (/repo/chat).
    (function () {
      var knownRoutes = [
        "landing",
        "login",
        "reset-password",
        "chat",
        "pricing",
        "our-ais",
        "company",
        "privacy",
        "terms",
        "settings",
        "contact",
        "unsubscribe"
      ];
      var parts = window.location.pathname.split("/").filter(Boolean);
      var firstPart = parts[0] || "";
      var isRootHostedRoute = knownRoutes.indexOf(firstPart) !== -1;
      var basePath = isRootHostedRoute || parts.length === 0 ? "/" : "/" + firstPart + "/";
      var routeParts = isRootHostedRoute ? parts : parts.slice(1);
      var routePath = "/" + routeParts.join("/");

      window.location.replace(basePath + "?p=" + encodeURIComponent(routePath + window.location.search + window.location.hash));
    })();
  </script>
</head>
<body></body>
</html>
