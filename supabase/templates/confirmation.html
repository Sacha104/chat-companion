<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code de vérification</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="460" cellpadding="0" cellspacing="0" style="background-color:#18181b;border-radius:12px;padding:40px;border:1px solid #27272a;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:28px;font-weight:bold;color:#a78bfa;">Pr@mpt</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <h1 style="margin:0;font-size:22px;color:#ffffff;">Votre code de vérification</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:14px;color:#a1a1aa;line-height:1.5;">
                Entrez le code ci-dessous pour confirmer votre inscription :
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="background-color:#27272a;border-radius:8px;padding:16px 32px;display:inline-block;letter-spacing:8px;font-size:32px;font-weight:bold;color:#a78bfa;">
                {{ .Token }}
              </div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <p style="margin:0;font-size:12px;color:#71717a;">
                Ce code expire dans 10 minutes.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-size:12px;color:#71717a;">
                Si vous n'avez pas créé de compte, ignorez cet e-mail.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
